task: arc_challenge_gen
dataset_path: allenai/ai2_arc
dataset_name: ARC-Challenge
test_split: test
fewshot_split: train
output_type: generate_until
doc_to_text: "Question: {{question.strip()}}\nA. {{choices.text[0]}}\nB. {{choices.text[1]}}\nC. {{choices.text[2]}}{% if choices.text|length > 3 %}\nD. {{choices.text[3]}}{% endif %}\nChoose A, B, C, or D. Answer with just the letter."
doc_to_target: "{{ 'ABCD'[answerKey|int - 1] if answerKey|string in '1234' else answerKey }}"
num_fewshot: 5
generation_kwargs:
  max_gen_toks: 2000
  until:
    - "<|im_end|>"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
filter_list:
  - name: first_letter
    filter:
      - function: regex
        regex_pattern: '[ABCD]'
      - function: take_first
metadata:
  version: 1.0
